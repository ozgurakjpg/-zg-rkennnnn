<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap / Üye Ol | Özgür Cep Burada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="main-header">
        <div class="container middle-header-content">
            <a href="../index.html" class="logo">ÖzgürCep<span>Burada</span></a>
            <nav class="main-nav">
                <a href="../index.html">Mağazaya Dön</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 0;">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login-form', this)">Giriş Yap</button>
                <button class="auth-tab" onclick="switchAuthTab('register-form', this)">Üye Ol</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" placeholder="E-posta adresiniz">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <div style="position: relative;">
                        <input type="password" id="login-pass" placeholder="Şifreniz">
                        <i class="fa-regular fa-eye-slash" onclick="togglePassword('login-pass', this)" style="position: absolute; right: 15px; top: 15px; cursor: pointer;"></i>
                    </div>
                </div>
                <button type="submit" class="auth-submit-btn">Giriş Yap</button>
            </form>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Ad Soyad</label>
                    <input type="text" placeholder="Adınız Soyadınız">
                </div>
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" placeholder="E-posta adresiniz">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" placeholder="Şifre oluşturun">
                </div>
                <button type="submit" class="auth-submit-btn">Üye Ol</button>
            </form>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="../script.js"></script>
    <script>
        function switchAuthTab(formId, btn) {
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            btn.classList.add('active');
        }

        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        document.querySelectorAll('.auth-form').forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const type = form.id === 'login-form' ? 'Giriş' : 'Kayıt';
                showToast(`${type} yapılıyor...`, 'success');
            });
        });
    </script>
</body>
</html>
