<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Hizmetleri | Özgür Cep Burada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="main-header">
        <div class="container middle-header-content">
            <a href="../index.html" class="logo">ÖzgürCep<span>Burada</span></a>
            <nav class="main-nav">
                <a href="../index.html">Anasayfaya Dön</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 0;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                <h2 style="margin-bottom: 25px; border-bottom: 2px solid #ff6000; padding-bottom: 10px; display: inline-block;">İletişim Bilgileri</h2>
                <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
                    <i class="fa-solid fa-phone" style="color: #ff6000;"></i>
                    <div>
                        <div style="font-weight: 700;">Telefon</div>
                        <div style="color: #666;">0850 000 00 00</div>
                    </div>
                </div>
                <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
                    <i class="fa-solid fa-envelope" style="color: #ff6000;"></i>
                    <div>
                        <div style="font-weight: 700;">E-posta</div>
                        <div style="color: #666;">destek@ozgurcepburada.com</div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fa-solid fa-location-dot" style="color: #ff6000;"></i>
                    <div>
                        <div style="font-weight: 700;">Adres</div>
                        <div style="color: #666;">Merkez Mah. Teknoloji Cad. No:1, İstanbul</div>
                    </div>
                </div>
            </div>
            <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                <h2 style="margin-bottom: 25px; border-bottom: 2px solid #ff6000; padding-bottom: 10px; display: inline-block;">Bize Yazın</h2>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 8px;">Adınız</label>
                    <input type="text" placeholder="Adınız" style="width: 100%; padding: 12px; border-radius: 8px; border: 1.5px solid #eee; outline: none;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 8px;">Mesajınız</label>
                    <textarea style="width: 100%; padding: 12px; border-radius: 8px; border: 1.5px solid #eee; height: 100px; outline: none;" placeholder="Size nasıl yardımcı olabiliriz?"></textarea>
                </div>
                <button style="background: #ff6000; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%;" onclick="alert('Mesajınız başarıyla iletildi.')">GÖNDER</button>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container"><p>&copy; 2026 Özgür Cep Burada</p></div>
    </footer>
</body>
</html>
