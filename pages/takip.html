<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Takibi | Özgür Cep Burada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="main-header">
        <div class="container middle-header-content">
            <a href="../index.html" class="logo">ÖzgürCep<span>Burada</span></a>
            <nav class="main-nav">
                <a href="../index.html">Anasayfaya Dön</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 80px 0;">
        <div style="max-width: 600px; margin: 0 auto; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;">
            <i class="fa-solid fa-truck-fast" style="font-size: 48px; color: #ff6000; margin-bottom: 20px;"></i>
            <h1 style="margin-bottom: 15px;">Sipariş Takibi</h1>
            <p style="color: #666; margin-bottom: 30px;">Siparişinizin durumunu öğrenmek için lütfen sipariş numaranızı girin.</p>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Sipariş Numarası</label>
                <input type="text" placeholder="Örn: #OCB-12345" style="width: 100%; padding: 15px; border-radius: 8px; border: 1.5px solid #eee; outline: none;">
            </div>
            <button class="auth-submit-btn" style="background: #ff6000; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%;" onclick="alert('Sipariş bilgileriniz sorgulanıyor...')">SORGULA</button>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container"><p>&copy; 2026 Özgür Cep Burada</p></div>
    </footer>
</body>
</html>
